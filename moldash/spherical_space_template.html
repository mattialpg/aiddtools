<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interactive UMAP Sphere</title>
<style>
html, body {
  margin: 0;
  height: 100%;
  background: #070A10;
  overflow: hidden;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
}
.hud {
  position: fixed;
  left: 12px;
  top: 12px;
  font: 12px/1.35 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  color: rgba(255,255,255,0.9);
  background: rgba(0,0,0,0.35);
  padding: 10px 12px;
  border-radius: 10px;
  user-select: none;
}
.hud button,
.zoom-indicator button {
  margin-top: 8px;
  width: 100%;
  border: 0;
  border-radius: 8px;
  padding: 6px 10px;
  background: rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.95);
  cursor: pointer;
}
.zoom-indicator {
  position: fixed;
  right: 12px;
  top: 12px;
  font: 12px/1.35 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  color: rgba(255,255,255,0.9);
  background: rgba(0,0,0,0.35);
  padding: 10px 12px;
  border-radius: 10px;
  user-select: none;
}
.hover-card {
  position: fixed;
  left: 0;
  top: 0;
  z-index: 20;
  width: 260px;
  padding: 12px;
  border-radius: 14px;
  background: rgba(7, 10, 16, 0.94);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
  color: rgba(255,255,255,0.95);
  font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  pointer-events: none;
  opacity: 0;
  transform: translate3d(14px, 14px, 0);
  transition: opacity 120ms ease;
}
.hover-card.is-visible {
  opacity: 1;
}
.hover-card-structure {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 170px;
  padding: 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.98);
}
.hover-card-structure canvas {
  display: block;
  width: 220px;
  height: 160px;
  max-width: 100%;
}
.hover-card-fallback {
  color: #475569;
  text-align: center;
}
</style>
</head>
<body>

<div class="hud">
  <div>Left drag rotate. Middle drag pan. Right drag cursor zoom. Scroll zoom.</div>
</div>
<div class="zoom-indicator">
  <div id="zoom-indicator">Zoom 100%</div>
  <button id="reset-view" type="button">Reset view</button>
</div>
<div id="hover-card" class="hover-card" aria-hidden="true">
  <div class="hover-card-structure">
    <canvas id="hover-structure" width="440" height="320"></canvas>
    <div id="hover-card-fallback" class="hover-card-fallback" hidden>Structure unavailable</div>
  </div>
</div>

<script src="https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js"></script>
<script>
window.__rdkitInitPromise =
  window.initRDKitModule
    ? window.initRDKitModule().then((RDKit) => {
        window.RDKit = RDKit;
        return RDKit;
      })
    : Promise.reject(new Error("RDKit MinimalLib failed to load"));
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";

__DATA_JS__

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x070A10, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

renderer.domElement.addEventListener("contextmenu", (e) => e.preventDefault());

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x070A10, 6, 22);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
camera.position.set(0, 0, 8.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);

controls.enableDamping = true;
controls.dampingFactor = 0.08;

controls.enableRotate = true;
controls.enablePan = true;
controls.enableZoom = true;
controls.zoomSpeed = 1;

controls.minDistance = 0.02;
controls.maxDistance = 18;

// right drag is handled manually for cursor-anchored zoom
controls.mouseButtons = {
  LEFT: THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.PAN,
  RIGHT: null
};

controls.update();
controls.saveState();
controls.addEventListener("change", updateZoomIndicator);

function getZoomPercent() {
  const baseDistance = 8.5;
  const distance = camera.position.distanceTo(controls.target);
  const pct = ((baseDistance / distance) - 1) * 100;
  return Math.max(0, Math.round(pct));
}

function updateZoomIndicator() {
  document.getElementById("zoom-indicator").textContent = `Zoom ${getZoomPercent()}%`;
}

document.getElementById("reset-view").addEventListener("click", () => {
  controls.reset();
  controls.update();
  updateZoomIndicator();
});

// Lights
scene.add(new THREE.AmbientLight(0x9fb4ff, 0.32));

const hemi = new THREE.HemisphereLight(0x89a8ff, 0x05070b, 0.5);
scene.add(hemi);

const dir = new THREE.DirectionalLight(0xe8f1ff, 1.55);
dir.position.set(6, 8, 10);
dir.castShadow = true;
dir.shadow.mapSize.set(1024, 1024);
dir.shadow.radius = 5;
dir.shadow.bias = -0.0008;
dir.shadow.camera.near = 1;
dir.shadow.camera.far = 30;
dir.shadow.camera.left = -6;
dir.shadow.camera.right = 6;
dir.shadow.camera.top = 6;
dir.shadow.camera.bottom = -6;
scene.add(dir);

const rim = new THREE.DirectionalLight(0x6fb8ff, 0.5);
rim.position.set(-5, -3, -8);
scene.add(rim);

// Sphere wireframe
const sphereRadius = __SPHERE_RADIUS__;
const wire = new THREE.LineSegments(
  new THREE.WireframeGeometry(new THREE.SphereGeometry(sphereRadius, 32, 20)),
  new THREE.LineBasicMaterial({ color: 0x6f86c9, transparent: true, opacity: 0.2 })
);
scene.add(wire);

// Points
const pointMeshes = [];
const sphereGeometry = new THREE.SphereGeometry(0.01, 16, 12);
const pointScaleStartDistance = 2;
const pointScaleMin = 0.1;
const pointFarMinScale = 0.18;
const hoverCard = document.getElementById("hover-card");
const hoverStructureCanvas = document.getElementById("hover-structure");
const hoverCardFallback = document.getElementById("hover-card-fallback");
const hoverStructureContext = hoverStructureCanvas.getContext("2d");
const rdkitReady = window.__rdkitInitPromise || Promise.reject(new Error("RDKit unavailable"));
const hoverDrawOptions = {
  bondLineWidth: 1.2,
  baseFontSize: 0.72
};
let hoveredMesh = null;
let pinnedMesh = null;
let leftClickStart = null;
let pendingSingleClick = null;
let hoverRenderToken = 0;
const groupPalette = [
  0x7bdff2,
  0xb2f7ef,
  0xffe08a,
  0xff9f9f,
  0xcdb4db,
  0xa0c4ff,
  0xfdffb6,
  0xcaffbf,
  0xffc6ff,
  0xf1c0e8
];

function getGroupColor(groupLabel) {
  if (groupLabel === -1) return new THREE.Color(0x94a3b8);
  return new THREE.Color(groupPalette[Math.abs(groupLabel) % groupPalette.length]);
}

for (let i = 0; i < DATA.length; i++) {
  const p = DATA[i];
  const color = getGroupColor(p.group_label);

  const material = new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.58,
    roughness: 0.55,
    metalness: 0.06
  });

  const m = new THREE.Mesh(sphereGeometry, material);
  m.position.set(p.x, p.y, p.z);
  m.userData.point = p;
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  pointMeshes.push(m);
}

function positionHoverCard(clientX, clientY) {
  const offset = 18;
  const cardRect = hoverCard.getBoundingClientRect();
  let left = clientX + offset;
  let top = clientY + offset;

  if (left + cardRect.width > window.innerWidth - 8) {
    left = clientX - cardRect.width - offset;
  }
  if (top + cardRect.height > window.innerHeight - 8) {
    top = clientY - cardRect.height - offset;
  }

  hoverCard.style.left = `${Math.max(8, left)}px`;
  hoverCard.style.top = `${Math.max(8, top)}px`;
}

function positionHoverCardForMesh(mesh) {
  if (!mesh) return;

  const projected = mesh.position.clone().project(camera);
  if (projected.z < -1 || projected.z > 1) return;

  const clientX = ((projected.x + 1) * 0.5) * window.innerWidth;
  const clientY = ((1 - projected.y) * 0.5) * window.innerHeight;
  positionHoverCard(clientX, clientY);
}

function drawHoverStructure(tree) {
  hoverStructureContext.clearRect(0, 0, hoverStructureCanvas.width, hoverStructureCanvas.height);
	tree.draw_to_canvas_with_highlights(
	  hoverStructureCanvas,
	  JSON.stringify({
		width: hoverStructureCanvas.width,
		height: hoverStructureCanvas.height,
		bondLineWidth: 2,
		baseFontSize: 0.7,
		additionalAtomLabelPadding: 0.125,
		padding: 0.01,
		fixedScale: 1.1
	  })
	);
  hoverCardFallback.hidden = true;
  hoverStructureCanvas.hidden = false;
}

function renderHoverStructure(smiles) {
  hoverRenderToken += 1;
  const token = hoverRenderToken;

  rdkitReady
    .then((RDKit) => {
      if (token !== hoverRenderToken) return;
      const mol = RDKit.get_mol(smiles);
      if (!mol || (typeof mol.is_valid === "function" && !mol.is_valid())) {
        throw new Error("Invalid SMILES");
      }
      try {
        drawHoverStructure(mol);
      } finally {
        if (typeof mol.delete === "function") mol.delete();
      }
    })
    .catch(() => {
      if (token !== hoverRenderToken) return;
      hoverStructureContext.clearRect(0, 0, hoverStructureCanvas.width, hoverStructureCanvas.height);
      hoverStructureCanvas.hidden = true;
      hoverCardFallback.hidden = false;
    });
}

function setHoveredMesh(mesh) {
  if (hoveredMesh === mesh) return;

  if (hoveredMesh) {
    hoveredMesh.material.emissiveIntensity = 0.58;
  }

  hoveredMesh = mesh;

  if (hoveredMesh) {
    hoveredMesh.material.emissiveIntensity = 0.95;
  }
}

function showHoverCard(point, clientX, clientY) {
  renderHoverStructure(point.smiles);
  hoverCard.classList.add("is-visible");
  hoverCard.setAttribute("aria-hidden", "false");
  positionHoverCard(clientX, clientY);
}

function hideHoverCard() {
  hoverRenderToken += 1;
  setHoveredMesh(null);
  hoverCard.classList.remove("is-visible");
  hoverCard.setAttribute("aria-hidden", "true");
}

function pinHover(hit) {
  pinnedMesh = hit.object;
  setHoveredMesh(hit.object);
  renderHoverStructure(hit.object.userData.point.smiles);
  hoverCard.classList.add("is-visible");
  hoverCard.setAttribute("aria-hidden", "false");
  positionHoverCardForMesh(hit.object);
}

function clearPinnedHover() {
  pinnedMesh = null;
  hideHoverCard();
}

function updateHover(clientX, clientY) {
  if (pinnedMesh) return;

  const hit = getPointHit(clientX, clientY, 16);
  if (!hit || !hit.object?.userData?.point) {
    hideHoverCard();
    return;
  }

  setHoveredMesh(hit.object);
  showHoverCard(hit.object.userData.point, clientX, clientY);
}

function updatePointScale() {
  const targetDistance = camera.position.distanceTo(controls.target);
  const baseScale =
    targetDistance >= pointScaleStartDistance
      ? 1
      : Math.max(pointScaleMin, targetDistance / pointScaleStartDistance);

  for (const mesh of pointMeshes) {
    const meshDistance = camera.position.distanceTo(mesh.position);
    const perspectiveFloor = pointFarMinScale * (meshDistance / Math.max(targetDistance, 1e-6));
    mesh.scale.setScalar(Math.min(1, Math.max(baseScale, perspectiveFloor)));
  }
}

// Zoom-to-point on zoom-in
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const crossEps = 0.035;
let zoomSide = 1;
const zoomAxis = new THREE.Vector3(0, 0, 1);
const doubleClickTolerancePx = 18;
const dragZoomTolerancePx = 100;
const doubleClickDistance = 0.25;
const dragZoomPxPerStep = 20;
const singleClickDelayMs = 220;
let rightZoomDrag = null;

function getZoomAnchor(clientX, clientY) {
  const nearbyPointHit = getPointHit(clientX, clientY, dragZoomTolerancePx);
  if (nearbyPointHit) return nearbyPointHit.point.clone();

  const rect = renderer.domElement.getBoundingClientRect();

  pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(pointer, camera);

  const wireHits = raycaster.intersectObject(wire, false);
  if (wireHits.length > 0) return wireHits[wireHits.length - 1].point.clone();

  const viewNormal = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
  const viewPlane = new THREE.Plane().setFromNormalAndCoplanarPoint(viewNormal, controls.target);
  const anchor = new THREE.Vector3();

  if (raycaster.ray.intersectPlane(viewPlane, anchor)) return anchor;

  return controls.target.clone();
}

function getPointHit(clientX, clientY, tolerancePx = doubleClickTolerancePx) {
  const rect = renderer.domElement.getBoundingClientRect();

  pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(pointer, camera);
  const pointHits = raycaster.intersectObjects(pointMeshes, false);
  if (pointHits.length > 0) return pointHits[0];

  let closestHit = null;
  let closestDistanceSq = tolerancePx * tolerancePx;

  for (const mesh of pointMeshes) {
    const projected = mesh.position.clone().project(camera);
    if (projected.z < -1 || projected.z > 1) continue;

    const screenX = ((projected.x + 1) * 0.5) * rect.width + rect.left;
    const screenY = ((1 - projected.y) * 0.5) * rect.height + rect.top;
    const dx = clientX - screenX;
    const dy = clientY - screenY;
    const distanceSq = dx * dx + dy * dy;

    if (distanceSq < closestDistanceSq) {
      closestDistanceSq = distanceSq;
      closestHit = { object: mesh, point: mesh.position.clone() };
    }
  }

  return closestHit;
}

renderer.domElement.addEventListener("dblclick", (e) => {
  if (pendingSingleClick) {
    window.clearTimeout(pendingSingleClick.timeoutId);
    pendingSingleClick = null;
  }

  const hit = getPointHit(e.clientX, e.clientY, doubleClickTolerancePx);
  if (!hit) return;

  const offset = new THREE.Vector3().subVectors(camera.position, controls.target);
  const nextDistance = Math.max(
    controls.minDistance,
    Math.min(controls.maxDistance, doubleClickDistance)
  );

  controls.target.copy(hit.object.position);
  zoomAxis.copy(offset).normalize();
  zoomSide = 1;
  camera.near = nextDistance < 0.2 ? 0.001 : 0.05;
  camera.updateProjectionMatrix();
  camera.position.copy(controls.target).addScaledVector(zoomAxis, nextDistance);
  controls.update();
  updateZoomIndicator();
});

function applyCursorZoom(anchor, factor) {
  const camToTarget = new THREE.Vector3().subVectors(camera.position, controls.target);
  const dist = camToTarget.length();
  if (dist <= 1e-9) return;

  if (dist > crossEps) {
    zoomAxis.copy(camToTarget).normalize();
  }

  let nextDist = dist * factor;
  nextDist = Math.max(controls.minDistance, Math.min(controls.maxDistance, nextDist));

  if (Math.abs(nextDist - dist) < 1e-9) return;

  camera.near = nextDist < 0.2 ? 0.001 : 0.05;
  camera.updateProjectionMatrix();

  const ratio = nextDist / dist;
  const newTarget = anchor.clone().add(
    controls.target.clone().sub(anchor).multiplyScalar(ratio)
  );

  controls.target.copy(newTarget);
  camera.position.copy(newTarget).addScaledVector(zoomAxis, zoomSide * nextDist);
  controls.update();
  updateZoomIndicator();
}

renderer.domElement.addEventListener("pointerdown", (e) => {
  if (e.button === 0) {
    leftClickStart = { x: e.clientX, y: e.clientY };
  }
  if (e.button !== 2) return;

  if (!pinnedMesh) hideHoverCard();
  const anchor = getZoomAnchor(e.clientX, e.clientY);
  rightZoomDrag = {
    x: e.clientX,
    y: e.clientY,
    anchor: anchor
  };
  renderer.domElement.setPointerCapture(e.pointerId);
  e.preventDefault();
});

renderer.domElement.addEventListener("pointermove", (e) => {
  if (!rightZoomDrag) {
    updateHover(e.clientX, e.clientY);
    return;
  }

  const dy = e.clientY - rightZoomDrag.y;
  if (Math.abs(dy) < 0.5) return;

  const factor = Math.pow(1.08, -dy / dragZoomPxPerStep);
  applyCursorZoom(rightZoomDrag.anchor, factor);

  rightZoomDrag.x = e.clientX;
  rightZoomDrag.y = e.clientY;
});

function endRightZoomDrag(pointerId) {
  if (!rightZoomDrag) return;
  rightZoomDrag = null;

  if (pointerId !== undefined && renderer.domElement.hasPointerCapture(pointerId)) {
    renderer.domElement.releasePointerCapture(pointerId);
  }
}

renderer.domElement.addEventListener("pointerup", (e) => {
  if (e.button === 0) {
    const start = leftClickStart;
    leftClickStart = null;
    if (!start) return;

    const dx = e.clientX - start.x;
    const dy = e.clientY - start.y;
    if ((dx * dx + dy * dy) <= 16) {
      if (pendingSingleClick) {
        window.clearTimeout(pendingSingleClick.timeoutId);
      }

      pendingSingleClick = {
        timeoutId: window.setTimeout(() => {
          const hit = getPointHit(e.clientX, e.clientY, 16);
          if (hit && hit.object?.userData?.point) {
            pinHover(hit);
          } else if (pinnedMesh) {
            clearPinnedHover();
          } else {
            hideHoverCard();
          }
          pendingSingleClick = null;
        }, singleClickDelayMs)
      };
    }
    return;
  }

  if (e.button === 2) {
    endRightZoomDrag(e.pointerId);
  }
});

renderer.domElement.addEventListener("pointercancel", (e) => {
  endRightZoomDrag(e.pointerId);
});

renderer.domElement.addEventListener("pointerleave", () => {
  if (!pinnedMesh) hideHoverCard();
});

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

window.addEventListener("resize", resize);
resize();
updateZoomIndicator();
updatePointScale();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updatePointScale();
  if (pinnedMesh) positionHoverCardForMesh(pinnedMesh);
  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
