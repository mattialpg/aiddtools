": 1.1991524152036024, "y": 1.1314631231663737, "z": -0.8628132985852719, "t": 0.1966335908872139}, {"smiles": "C1=C[C@H](OCCCCCCOc2c[nH]nn2)CCN1", "x": -0.27145801791637036, "y": 1.2276000000620606, "z": -2.347105852401751, "t": 0.5760794687540605}, {"smiles": "Cc1csc(COP(=O)([O-])OP(=O)([O-])OCC[C@H]2C=CNCC2)c1", "x": -1.8833292572346314, "y": 0.5128787844608796, "z": -1.5197588266488042, "t": 0.46199677514614385}, {"smiles": "C1=C[C@H](OCCCCCCOc2c[nH]nn2)CCN1", "x": -0.2843579449868796, "y": 1.2177972298042428, "z": -2.3450430786330076, "t": 0.5728548922067616}, {"smiles": "N#Cc1cccc(COP(=O)([O-])OP(=O)([O-])OCC[C@H]2C=CNCC2)c1", "x": -0.9053376390750042, "y": -2.440762707121154, "z": 0.16887758879492712, "t": 0.5417988288299279}, {"smiles": "N#Cc1cccc(COP(=O)([O-])OP(=O)([O-])OCC[C@H]2C=CNCC2)c1", "x": -0.8793423025304122, "y": -2.4115981943134206, "z": 0.14316823858701233, "t": 0.5185701299415285}, {"smiles": "C1=C[C@H](OCCCCCCOc2c[nH]nn2)CCN1", "x": -0.2492153546944325, "y": 1.2436849536688523, "z": -2.352363029058209, "t": 0.582536201040818}, {"smiles": "Cc1csc(COP(=O)([O-])OP(=O)([O-])OCC[C@H]2C=CNCC2)c1", "x": -1.8728886083747986, "y": 0.47297258425702593, "z": -1.5142422679535037, "t": 0.45124744722176613}, {"smiles": "N#Cc1cccc(COP(=O)([O-])OP(=O)([O-])OCC[C@H]2C=CNCC2)c1", "x": -0.8707235163517022, "y": -2.40628200807826, "z": 0.08794748625050382, "t": 0.512291508670526}, {"smiles": "N#Cc1cccc(COP(=O)([O-])OP(=O)([O-])OCC[C@H]2C=CNCC2)c1", "x": -0.8709234315664187, "y": -2.434898653318546, "z": 0.13650888598878894, "t": 0.5299478375963733}, {"smiles": "C1=C[C@H](OCCCCCCOc2c[nH]nn2)CCN1", "x": -0.27658042178018366, "y": 1.2211857128254133, "z": -2.3522138169786557, "t": 0.5774334174900684}, {"smiles": "CC(=O)c1cccc2[nH]c(CCNC(=O)OCc3c[nH]nn3)nc12", "x": -1.0621434106646115, "y": 2.622314060453428, "z": 0.6334112801229239, "t": 0.743747605506711}, {"smiles": "Nc1ccc(NC(=O)CCC(=O)N=NC=C2C(=O)Nc3ccccc32)cc1", "x": -0.48684402959868334, "y": -1.46989662923382, "z": 2.2548109894712263, "t": 0.6245367103255576}, {"smiles": "Nc1ncnc2c1ccn2CCNC(=O)COc1cccc(CCO)c1", "x": 0.429729093498194, "y": -0.7506394067449431, "z": 2.210112710642752, "t": 0.4079696591997571}];

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x070A10, 1);
document.body.appendChild(renderer.domElement);

renderer.domElement.addEventListener("contextmenu", (e) => e.preventDefault());

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x070A10, 6, 22);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
camera.position.set(0, 0, 8.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);

controls.enableDamping = true;
controls.dampingFactor = 0.08;

controls.enableRotate = true;
controls.enablePan = true;

// We implement zoom-to-point ourselves
controls.enableZoom = false;

controls.minDistance = 0.02;
controls.maxDistance = 18;

// left drag rotate, middle drag pan
controls.mouseButtons = {
  LEFT: THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.PAN,
  RIGHT: THREE.MOUSE.DOLLY
};

controls.update();
controls.saveState();

document.getElementById("reset-view").addEventListener("click", () => {
  controls.reset();
  controls.update();
});

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const dir = new THREE.DirectionalLight(0xffffff, 1.2);
dir.position.set(6, 8, 10);
scene.add(dir);

// Sphere wireframe
const sphereRadius = 3.2;
const wire = new THREE.LineSegments(
  new THREE.WireframeGeometry(new THREE.SphereGeometry(sphereRadius, 32, 20)),
  new THREE.LineBasicMaterial({ color: 0x6f86c9, transparent: true, opacity: 0.2 })
);
scene.add(wire);

// Points
const base = new THREE.Color(0x9bb7ff);
const alt = new THREE.Color(0x7ef0c1);

const pointMeshes = [];
const sphereGeometry = new THREE.SphereGeometry(0.05, 16, 12);
let clickStartX = 0;
let clickStartY = 0;

for (let i = 0; i < DATA.length; i++) {
  const p = DATA[i];
  const color = base.clone().lerp(alt, p.t);

  const material = new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.8,
    roughness: 0.4,
    metalness: 0.1
  });

  const m = new THREE.Mesh(sphereGeometry, material);
  m.position.set(p.x, p.y, p.z);
  scene.add(m);
  pointMeshes.push(m);
}

// Zoom-to-point on zoom-in
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const crossEps = 0.035;
let zoomSide = 1;
const zoomAxis = new THREE.Vector3(0, 0, 1);

function getZoomAnchor(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();

  pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(pointer, camera);

  const pointHits = raycaster.intersectObjects(pointMeshes, false);
  if (pointHits.length > 0) return pointHits[0].point.clone();

  const wireHits = raycaster.intersectObject(wire, false);
  if (wireHits.length > 0) return wireHits[0].point.clone();

  const viewNormal = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
  const viewPlane = new THREE.Plane().setFromNormalAndCoplanarPoint(viewNormal, controls.target);
  const anchor = new THREE.Vector3();

  if (raycaster.ray.intersectPlane(viewPlane, anchor)) return anchor;

  return controls.target.clone();
}

function getPointHit(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();

  pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(pointer, camera);
  const pointHits = raycaster.intersectObjects(pointMeshes, false);
  return pointHits.length > 0 ? pointHits[0] : null;
}

renderer.domElement.addEventListener("pointerdown", (e) => {
  if (e.button !== 0) return;
  clickStartX = e.clientX;
  clickStartY = e.clientY;
});

renderer.domElement.addEventListener("pointerup", (e) => {
  if (e.button !== 0) return;

  const dx = e.clientX - clickStartX;
  const dy = e.clientY - clickStartY;
  if ((dx * dx + dy * dy) > 16) return;

  const hit = getPointHit(e.clientX, e.clientY);
  if (!hit) return;

  const offset = new THREE.Vector3().subVectors(camera.position, controls.target);
  controls.target.copy(hit.object.position);
  camera.position.copy(controls.target).add(offset);
  zoomAxis.copy(offset).normalize();
  zoomSide = 1;
  controls.update();
});

renderer.domElement.addEventListener("wheel", (e) => {
  e.preventDefault();

  const zoomingOut = e.deltaY > 0;
  const factor = zoomingOut ? 1.08 : 0.92;

  const camToTarget = new THREE.Vector3().subVectors(camera.position, controls.target);
  const dist = camToTarget.length();
  if (dist > crossEps) {
    zoomAxis.copy(camToTarget).normalize();
  }

  let nextDist = dist * factor;
  nextDist = Math.max(controls.minDistance, Math.min(controls.maxDistance, nextDist));

  if (Math.abs(nextDist - dist) < 1e-9) return;

  if (!zoomingOut && dist <= crossEps) {
    zoomSide *= -1;
  }

  camera.near = nextDist < 0.2 ? 0.001 : 0.05;
  camera.updateProjectionMatrix();

  if (zoomingOut) {
    camera.position.copy(controls.target).addScaledVector(zoomAxis, zoomSide * nextDist);
    controls.update();
    return;
  }

  const anchor = getZoomAnchor(e.clientX, e.clientY);
  const ratio = nextDist / dist;

  const newTarget = anchor.clone().add(
    controls.target.clone().sub(anchor).multiplyScalar(ratio)
  );

  controls.target.copy(newTarget);
  camera.position.copy(newTarget).addScaledVector(zoomAxis, zoomSide * nextDist);
  controls.update();
}, { passive: false });

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

window.addEventListener("resize", resize);
resize();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
